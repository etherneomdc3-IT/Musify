<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ReelTube</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#000;
font-family:'DM Sans',sans-serif;
color:#fff;
overflow:hidden;
}

/* ===== FEED ===== */
#feed{
height:100vh;
width:100vw;
overflow-y:scroll;
scroll-snap-type:y mandatory;
scroll-behavior:smooth;
}

/* Hide scrollbar */
#feed::-webkit-scrollbar{display:none}

/* ===== VIDEO ITEM ===== */
.video-item{
height:100vh;
width:100%;
position:relative;
scroll-snap-align:start;
background:#000;
display:flex;
align-items:center;
justify-content:center;
}

.video-item iframe{
width:100%;
height:100%;
border:none;
pointer-events:none;
}

.video-item.active iframe{
pointer-events:auto;
}

/* ===== OVERLAY INFO ===== */
.video-info{
position:absolute;
bottom:90px;
left:15px;
right:80px;
z-index:10;
}

.video-channel{
font-family:'Bebas Neue',cursive;
font-size:1.5rem;
color:#ff2d55;
margin-bottom:6px;
}

.video-title{
font-size:.9rem;
opacity:.9;
line-height:1.4;
}

/* ===== SIDE ACTIONS ===== */
.side-actions{
position:absolute;
right:12px;
bottom:100px;
display:flex;
flex-direction:column;
gap:20px;
align-items:center;
z-index:10;
}

.action{
display:flex;
flex-direction:column;
align-items:center;
font-size:13px;
cursor:pointer;
}

.action .icon{
width:48px;
height:48px;
border-radius:50%;
background:rgba(255,255,255,.15);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
margin-bottom:4px;
transition:.2s;
}

.action:active .icon{
transform:scale(.85);
background:rgba(255,45,85,.4);
}

/* ===== TOP BAR ===== */
#topbar{
position:fixed;
top:0;
left:0;
right:0;
padding:14px 16px;
display:flex;
justify-content:center;
z-index:100;
background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent);
font-family:'Bebas Neue',cursive;
font-size:1.8rem;
letter-spacing:2px;
}
</style>
</head>
<body>

<div id="topbar">ReelTube</div>

<div id="feed"></div>

<script>
let videos = [
{id:'dQw4w9WgXcQ',title:'Never Gonna Give You Up',channel:'Rick Astley'},
{id:'jNQXAC9IVRw',title:'Me at the zoo',channel:'jawed'},
{id:'9bZkp7q19f0',title:'GANGNAM STYLE',channel:'PSY'},
{id:'kJQP7kiw5Fk',title:'Despacito',channel:'Luis Fonsi'},
{id:'RgKAFK5djSk',title:'See You Again',channel:'Wiz Khalifa'}
];

const feed = document.getElementById('feed');
let observers = [];

/* ===== BUILD FEED ===== */
function buildFeed(){
feed.innerHTML='';

videos.forEach(v=>{
const div=document.createElement('div');
div.className='video-item';

div.innerHTML=`
<iframe 
src="https://www.youtube.com/embed/${v.id}?playsinline=1&enablejsapi=1&controls=1&rel=0"
allow="autoplay; encrypted-media"
allowfullscreen></iframe>

<div class="video-info">
<div class="video-channel">${v.channel}</div>
<div class="video-title">${v.title}</div>
</div>

<div class="side-actions">
<div class="action" onclick="like(this)">
<div class="icon">❤️</div>
<span>Like</span>
</div>
<div class="action" onclick="openYT('${v.id}')">
<div class="icon">▶️</div>
<span>Open</span>
</div>
</div>
`;

feed.appendChild(div);
});

observeVideos();
}

/* ===== INTERSECTION OBSERVER (AUTO PLAY LIKE TIKTOK) ===== */
function observeVideos(){

const options={
root:feed,
threshold:0.7
};

const observer=new IntersectionObserver((entries)=>{
entries.forEach(entry=>{
const iframe=entry.target.querySelector('iframe');
if(entry.isIntersecting){
entry.target.classList.add('active');
iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
}else{
entry.target.classList.remove('active');
iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
}
});
},options);

document.querySelectorAll('.video-item').forEach(item=>{
observer.observe(item);
});
}

/* ===== LIKE ===== */
function like(btn){
const icon=btn.querySelector('.icon');
icon.style.transform='scale(1.4)';
setTimeout(()=>icon.style.transform='',200);
}

/* ===== OPEN YT ===== */
function openYT(id){
window.open(`https://www.youtube.com/watch?v=${id}`,'_blank');
}

buildFeed();
</script>

</body>
</html>
